</style></head><body><main id="main-content"><div class="bg-ring"></div><div class="bg-ring"></div><div class="bg-ring"></div><div class="logo"><img decoding="async" src="../img/logo.webp" alt="Time4Bets" width="160" height="44"></div><div class="ring-wrap"><div class="ring-a"></div><div class="ring-b"></div><div class="num" id="num">3</div></div><h2>Preparing Your Game</h2><div class="track"><div class="fill" id="fill"></div></div><p class="hint">Not redirecting? <a href="https://sshortly.net/bc885cb" rel="nofollow noopener">Click here</a></p></main><script>
(function(){
  var redirectUrl = 'https://sshortly.net/bc885cb';
  var seconds = 3;
  var num = document.getElementById('num');
  var fill = document.getElementById('fill');
  var redirected = false;

  function go(){
    if (redirected) return;
    redirected = true;
    window.location.replace(redirectUrl);
  }

  if (fill) {
    requestAnimationFrame(function(){
      fill.style.width = '100%';
    });
  }

  if (num) num.textContent = seconds;

  var timer = setInterval(function(){
    seconds -= 1;
    if (num) num.textContent = Math.max(seconds, 0);
    if (seconds <= 0) {
      clearInterval(timer);
      go();
    }
  }, 1000);

  window.addEventListener('pageshow', function(event){
    if (event.persisted) {
      seconds = 1;
      if (num) num.textContent = '1';
      setTimeout(go, 300);
    }
  });
})();
</script></body></html>
